name: Build TrollStore IPA

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app
        
      - name: Build Xcode Project
        run: |
          xcodebuild clean build \
            -project "DistractionFreeIOS.xcodeproj" \
            -scheme "DistractionFreeIOS" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath derivedData \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package Payload to IPA
        run: |
          brew install ldid
          cd derivedData/Build/Products/Release-iphoneos
          mkdir Payload
          mv DistractionFreeIOS.app Payload/
          ldid -S Payload/DistractionFreeIOS.app
          zip -r DistractionFreeIOS.ipa Payload/

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DistractionFreeIOS-TrollStore
          path: derivedData/Build/Products/Release-iphoneos/DistractionFreeIOS.ipa